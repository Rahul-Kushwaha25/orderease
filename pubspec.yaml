name: orderease
description: "A production-grade Kirana store stock ordering Flutter app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Database
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # Authentication
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

  # Navigation
  go_router: ^14.2.7

  # Dependency Injection
  get_it: ^8.0.2

  # UI
  flutter_svg: ^2.0.10+1

  # Deep Links / WhatsApp
  url_launcher: ^6.3.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Persistence
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
